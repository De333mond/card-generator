<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tablegame Card Generator</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>

<body>
  <main class="shell">
    <section class="card">
      <form id="card-form" method="get" action="/">
        <div class="field">
          <label for="title">Название карты</label>
          <input id="title" name="title" type="text" value="Карта способности" />
        </div>
        <div class="field" id="creature-field">
          <label for="creature">Название существа</label>
          <input id="creature" name="creature" type="text" value="Существо" />
        </div>
        <div class="field">
          <label for="icon">Подпись иконки</label>
          <input id="icon" name="icon" type="text" value="DDS" />
        </div>
        <div class="field">
          <label for="icon-file">DDS иконка</label>
          <input id="icon-file" type="file" accept=".dds,image/vnd.ms-dds" />
          <input id="icon-data" name="icon_data" type="hidden" value="" />
          <div id="icon-dropzone" class="dropzone" tabindex="0" role="button" aria-label="Загрузить DDS иконку">
            <div class="dropzone-title">Перетащи DDS файл сюда или нажми, чтобы выбрать</div>
            <div id="icon-status" class="dropzone-status">Иконка не загружена, используется заглушка.</div>
          </div>
        </div>
        <div class="field">
          <label for="description">Описание</label>
          <textarea id="description" name="description">Короткое описание способности.

Здесь можно собрать текст под конкретную карту.</textarea>
        </div>
        <div class="field phases" id="phases-field">
          <div class="group-title">Фазы</div>
          <div class="phase-row">
            <label class="phase-chip"><input type="checkbox" name="phase1" checked /> Передвижение</label>
            <label class="phase-chip"><input type="checkbox" name="phase2" checked /> Атака</label>
            <label class="phase-chip"><input type="checkbox" name="phase3" checked /> Строительство</label>
            <label class="phase-chip"><input type="checkbox" name="phase4" checked /> Изучение</label>
          </div>
        </div>
        <div class="field" id="rp-field" style="display: none;">
          <label for="rp-value">РП значение</label>
          <input id="rp-value" name="rp_value" type="number" value="5" />
        </div>
        <div class="field" id="crystal-field" style="display: none;">
          <label for="crystal">Значение кристалла</label>
          <input id="crystal" name="crystal" type="number" value="0" />
        </div>
        <div class="field" id="cloud-field" style="display: none;">
          <label for="cloud">Значение облака</label>
          <input id="cloud" name="cloud" type="number" value="0" />
        </div>
        <div class="field" id="clock-field" style="display: none;">
          <label for="clock">Значение времени</label>
          <input id="clock" name="clock" type="number" value="0" />
        </div>
        <div class="field" id="unlocks-field" style="display: none;">
          <label for="unlocks">Разблокирует</label>
          <textarea id="unlocks" name="unlocks"></textarea>
        </div>
        <div class="field" id="requirements-field" style="display: none;">
          <label for="requirements">Требования</label>
          <textarea id="requirements" name="requirements"></textarea>
        </div>
        <div class="field" id="unit-fieldset" style="display: none;">
          <div class="group-title">Карта юнита</div>
          <div class="field">
            <label for="unit-health">Здоровье</label>
            <input id="unit-health" name="unit_health" type="number" value="5" min="0" />
          </div>
          <div class="field">
            <label for="unit-shields">Щиты</label>
            <input id="unit-shields" name="unit_shields" type="number" value="10" min="0" />
          </div>
          <div class="field">
            <label for="unit-forward">Вперёд</label>
            <input id="unit-forward" name="unit_forward" type="number" value="0" min="0" />
          </div>
          <div class="field">
            <label for="unit-shield">Защита</label>
            <input id="unit-shield" name="unit_shield" type="number" value="0" min="0" />
          </div>
          <div class="field">
            <label for="unit-sword">Меч</label>
            <input id="unit-sword" name="unit_sword" type="number" value="0" min="0" />
          </div>
          <div class="field">
            <label for="unit-crystal">Кристалл</label>
            <input id="unit-crystal" name="unit_crystal" type="number" value="0" min="0" />
          </div>
          <div class="field">
            <label for="unit-cloud">Облако</label>
            <input id="unit-cloud" name="unit_cloud" type="number" value="0" min="0" />
          </div>
          <div class="field">
            <label for="unit-description">Описание</label>
            <textarea id="unit-description" name="unit_description">Описание юнита</textarea>
          </div>
          <div class="field">
            <label for="unit-properties">Свойства</label>
            <textarea id="unit-properties" name="unit_properties">Свойства юнита</textarea>
          </div>
        </div>
        <div class="actions">
          <button class="button primary" type="submit" onclick="event.preventDefault(); return false;">Обновить
            превью</button>
          <a class="button secondary" href="#" download>Скачать PNG</a>
        </div>
      </form>
    </section>

    <section class="preview">
      <div class="preview-head">
        <h2>Превью карты</h2>
        <div class="hint" id="preview-hint">/cards/ability.png</div>
      </div>
      <img id="card-preview" src="" alt="Card preview" />
    </section>

    <section class="card-type-selector">
      <div class="selector-title">Тип карты</div>
      <div class="selector-options">
        <button class="type-button active" data-type="ability">Карта способности</button>
        <button class="type-button" data-type="air-unit">Карта воздушного юнита</button>
        <button class="type-button" data-type="study">Карта изучения</button>
        <button class="type-button" data-type="building">Карта здания</button>
        <button class="type-button" data-type="unit">Карта юнита</button>
      </div>
    </section>
  </main>
  <script src="/static/script.js"></script>
</body>

</html>
